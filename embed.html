<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeliveryHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    #gas-frame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }

    /* Loader visível enquanto o iframe ainda não carregou */
    #frame-loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #FF6B35 0%, #c0392b 100%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      z-index: 10;
      transition: opacity 0.3s ease;
    }
    #frame-loader.hidden { opacity: 0; pointer-events: none; }
    #frame-loader .logo  { font-size: 3rem; margin-bottom: 1rem; }
    #frame-loader p      { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="frame-loader">
    <div class="logo">🛵</div>
    <div class="spinner"></div>
    <p>Carregando DeliveryHub...</p>
  </div>

  <!-- src definido pelo script abaixo — nunca hardcode aqui -->
  <iframe id="gas-frame" allow="popup" title="DeliveryHub"></iframe>

  <script>
    (function() {
      'use strict';

      // ─────────────────────────────────────────────────────────────
      // ⚙️  CONFIGURAÇÃO
      // ─────────────────────────────────────────────────────────────
      var GAS_BASE_URL  = 'https://script.google.com/macros/s/AKfycbwuBPwEq2gYfEk5O65JnSNRXU6fy54P3uSnWqRfsN0jaIKKUvPdIlyWPQUjg25bYQhHGg/exec';
      var PORTEIRO_URL  = 'https://direxbuilder.github.io/dh/';
      var STORAGE_KEY   = 'dh_session_v1';
      // ─────────────────────────────────────────────────────────────

      var iframe  = document.getElementById('gas-frame');
      var loader  = document.getElementById('frame-loader');
      var _popupRef = null;

      // ── Storage helpers (first-party localStorage) ────────────────

      function carregarSessao() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
      }

      function salvarSessao(token, user) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ token: token, user: user }));
        } catch (e) { /* quota exceeded */ }
      }

      function limparSessao() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
      }

      // ── Montagem da URL do iframe ─────────────────────────────────
      //
      // Três casos possíveis:
      //   1. Sessão salva → injeta ?rt=TOKEN&ru=USER_B64 (restauração direta)
      //   2. ?gtoken= na URL do embed → injeta no GAS via ?gtoken= no src
      //   3. Sem nada → GAS carrega sem params → detecta sem sessão → DH_NEED_AUTH

      function montarUrlIframe(gtoken) {
        if (gtoken) {
          // JWT fresco vindo do porteiro (fallback redirect) — repassa para o GAS
          return GAS_BASE_URL + '?gtoken=' + encodeURIComponent(gtoken);
        }

        var sessao = carregarSessao();
        if (sessao && sessao.token) {
          // Sessão salva — injeta para restauração sem passar pelo login
          var userB64;
          try {
            userB64 = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(sessao.user || {})))));
          } catch (e) {
            // btoa falhou (caracteres especiais no nome) — boot sem injeção
            return GAS_BASE_URL;
          }
          return GAS_BASE_URL
            + '?rt=' + encodeURIComponent(sessao.token)
            + '&ru=' + userB64;
        }

        // Sem sessão — GAS detecta e posta DH_NEED_AUTH
        return GAS_BASE_URL;
      }

      function carregarIframe(gtoken, recarregar) {
        var url = montarUrlIframe(gtoken || null);

        if (recarregar) {
          iframe.src = 'about:blank';
          setTimeout(function() { iframe.src = url; }, 50);
        } else {
          iframe.src = url;
        }

        // Limpa ?gtoken= da URL do embed sem causar reload,
        // assim o F5 não reenvia o JWT expirado
        if (gtoken && window.history && window.history.replaceState) {
          window.history.replaceState(null, '', window.location.pathname);
        }
      }

      // ── Popup de autenticação ─────────────────────────────────────

      function abrirPopupLogin() {
        var w = 480, h = 580;
        var left = Math.round((screen.width  - w) / 2);
        var top  = Math.round((screen.height - h) / 2);
        var features = [
          'width=' + w, 'height=' + h,
          'left='  + left, 'top=' + top,
          'resizable=no', 'scrollbars=no',
          'status=no', 'toolbar=no'
        ].join(',');

        _popupRef = window.open(PORTEIRO_URL, 'dh_gis_login', features);

        if (!_popupRef || _popupRef.closed) {
          // Popup bloqueado — redireciona o embed inteiro para o porteiro.
          // O porteiro fará redirect de volta para embed.html?gtoken=
          window.location.href = PORTEIRO_URL;
        }
      }

      // ── Listener de mensagens ─────────────────────────────────────

      window.addEventListener('message', function(event) {
        var origem = event.origin || '';

        // Mensagens do porteiro (popup ou redirect) → credential JWT
        if (origem === 'https://direxbuilder.github.io') {
          if (event.data && event.data.type === 'GIS_AUTH' && event.data.credential) {
            // Fecha popup se ainda aberto
            if (_popupRef && !_popupRef.closed) { _popupRef.close(); _popupRef = null; }
            // Repassa JWT para o GAS via reload do iframe com ?gtoken=
            carregarIframe(event.data.credential, true);
          }
          return;
        }

        // Mensagens do GAS iframe → eventos de sessão
        var origemGas = (
          origem.indexOf('script.google.com')      !== -1 ||
          origem.indexOf('googleusercontent.com')  !== -1
        );
        if (!origemGas) return;
        if (!event.data || typeof event.data.type !== 'string') return;

        switch (event.data.type) {

          case 'DH_AUTH_SUCCESS':
            // GAS autenticou — salva sessão no localStorage (first-party)
            if (event.data.token && event.data.user) {
              salvarSessao(event.data.token, event.data.user);
              // Recarrega iframe com sessão injetada para garantir F5 funcional
              carregarIframe(null, true);
            }
            break;

          case 'DH_NEED_AUTH':
            // GAS não tem sessão — abre popup de login.
            // Ocorre no primeiro acesso ou quando sessão expirou/foi corrompida.
            limparSessao(); // remove sessão inválida
            abrirPopupLogin();
            break;

          case 'DH_LOGOUT':
            // Usuário fez logout no GAS — limpa tudo e redireciona ao porteiro
            limparSessao();
            if (_popupRef && !_popupRef.closed) { _popupRef.close(); _popupRef = null; }
            window.location.href = PORTEIRO_URL;
            break;
        }
      });

      // ── Oculta loader quando iframe termina de carregar ───────────

      iframe.addEventListener('load', function() {
        setTimeout(function() {
          if (loader) loader.classList.add('hidden');
        }, 200);
      });

      // ── Inicialização ─────────────────────────────────────────────
      //
      // Verifica se o porteiro redirecionou com ?gtoken= nesta URL.
      // Ocorre quando popup foi bloqueado e o porteiro fez redirect
      // para embed.html?gtoken=JWT em vez de GAS_URL?gtoken=JWT.

      var urlParams = new URLSearchParams(window.location.search);
      var gtokenInicial = urlParams.get('gtoken') || '';

      carregarIframe(gtokenInicial, false);

    })();
  </script>

</body>
</html>
